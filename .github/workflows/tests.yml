name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Playwright browsers
        run: mvn -B exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium" -Dexec.classpathScope=test

      - name: Run tests
        id: tests
        continue-on-error: true
        run: mvn -B test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Get Allure report history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Carry over Allure trend history
        if: always()
        run: |
          mkdir -p target/allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/. target/allure-results/history/
          fi

      - name: Install Allure commandline
        if: always()
        run: npm install -g allure-commandline --no-fund --no-audit

      - name: Build Allure report
        if: always()
        run: allure generate target/allure-results --clean -o allure-report

      - name: Publish Allure report to GitHub Pages
        if: always() && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
